  - aid: bloomberg-lp:data-license
    name: Bloomberg Data License (DL / BEAP)
    description: >-
      Bulk reference, pricing, regulatory, and alternative-data delivery service covering over 50 million securities and
      30,000+ fields. Accessed via REST API (HAPI / Bloomberg Enterprise Access Point), SFTP, or cloud delivery (AWS,
      Azure, GCP). Suited to back-office, risk, compliance and research use cases that do not require streaming market
      data.
    humanURL: https://www.bloomberg.com/professional/products/data/data-management/data-license/
    tags:
