  - aid: bloomberg-lp:b-pipe
    name: Bloomberg B-PIPE
    description: >-
      Bloomberg's flagship enterprise market data feed, delivering normalized, consolidated, real-time and reference
      data across all asset classes with Bloomberg's entitlement and identifier infrastructure. Offered as
      Bloomberg-hosted B-PIPE and Managed B-PIPE, with access via BLPAPI.
