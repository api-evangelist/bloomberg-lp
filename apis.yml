  - aid: bloomberg-lp:blpapi
    name: Bloomberg BLPAPI (Desktop API)
    description: >-
      BLPAPI is Bloomberg's core programming interface for the Bloomberg Terminal Desktop API, Server API (SAPI),
      B-PIPE, and Platform products. It exposes a unified asynchronous session/event/subscription model for requesting
      reference data, historical data, intraday bars and ticks, market data subscriptions, instrument lookup, and field
      information via services such as //blp/refdata, //blp/mktdata, //blp/apiflds, and //blp/instruments. SDKs are
      published in C++, Java, Python, and .NET; the Python SDK alone has 39 releases and ships against version 3.26.4.
    humanURL: https://bloomberg.github.io/blpapi-docs/
    tags:
      - BLPAPI
      - Desktop API
      - Reference Data
      - Historical Data
      - Market Data
      - SDK
