  - aid: bloomberg-lp:server-api
    name: Bloomberg Server API (SAPI)
    description: >-
      Server-side variant of BLPAPI that lets a single Bloomberg Terminal user serve real-time market data, historical
      data, reference data, and calculation-engine output to multiple in-house applications and end users from a Linux
      or Windows server. Uses the same BLPAPI SDKs (C, C++, .NET, Python, Java) as the Desktop API.
    humanURL: https://www.bloomberg.com/professional/products/data/data-connectivity/server-api/
    tags:
      - Server API
