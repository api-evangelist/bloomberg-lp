apis:
  - aid: bloomberg-lp:openfigi
    name: OpenFIGI API
    description: >-
      OpenFIGI is the free, public REST API operated by Bloomberg as the FIGI Registration Authority for the Object
      Management Group (OMG) Financial Instrument Global Identifier standard. It maps third-party identifiers (TICKER,
      ISIN, CUSIP, SEDOL, BBGID, COMMON, etc.) to FIGIs and exposes search and filter endpoints across hundreds of
      millions of active and inactive instruments spanning equities, fixed income, derivatives, currencies, commodities,
      indices, and crypto. The /v3 API is JSON over HTTPS at api.openfigi.com, with optional X-OPENFIGI-APIKEY
      authentication that lifts rate limits.
    humanURL: https://www.openfigi.com/api
    baseURL: https://api.openfigi.com/v3
    tags:
