aid: bloomberg-lp
name: Bloomberg L.P.
description: >-
  Bloomberg L.P. is a privately held financial, software, data, and media company founded by Michael Bloomberg in 1981
  and headquartered in New York City. The company is best known for the Bloomberg Terminal, which delivers real-time
  market data, news, analytics, and trading tools to roughly 325,000 subscribers worldwide, and for Bloomberg News,
  Bloomberg.com, Bloomberg Television, and Bloomberg Industry Group (formerly Bloomberg BNA). On the developer side,
  Bloomberg exposes the BLPAPI (Bloomberg API) family across the Desktop API, Server API, B-PIPE, and Data License
  products via SDKs in C++, Java, Python and .NET, and operates OpenFIGI — the free, public Financial Instrument Global
  Identifier (FIGI) symbology API and the most openly accessible Bloomberg API surface for the general developer
  audience.
